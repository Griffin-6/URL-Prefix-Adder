<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前缀助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 520px;
            /* 高度由内容自然撑开，避免vh溢出产生底部白边 */
            min-height: auto;
            height: auto;
            background: transparent;  /* 背景透明声明，实际颜色由下面变量覆盖 */
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        /* 主题变量 — 根背景色与卡片底层同色系，缝隙不可见 */
        :root {
            --root-bg: #14141e;          /* 深色底布，匹配卡片半透底层 */
            --card-bg: rgba(20, 20, 30, 0.82);
            --text-primary: #eef2ff;
            --text-secondary: #a0aec0;
            --border: rgba(255,255,255,0.12);
            --input-bg: rgba(0,0,0,0.35);
            --accent: #4a6ee0;
            --scrollbar-thumb: #5a6e9e;
        }

        body.light {
            --root-bg: #eef2f8;           /* 浅色底布，柔和高亮 */
            --card-bg: rgba(245, 245, 250, 0.92);
            --text-primary: #1e2a3e;
            --text-secondary: #4a5568;
            --border: rgba(0,0,0,0.08);
            --input-bg: rgba(0,0,0,0.04);
            --scrollbar-thumb: #b9c3d0;
        }

        /* 根元素强制应用底布颜色，任何缝隙都显示此背景，杜绝白色 */
        html, body {
            background-color: var(--root-bg) !important;
        }

        /* 完美毛玻璃卡片：无圆角漏白，完全覆盖弹窗区域 */
        .glass-card {
            width: 100%;
            min-height: 100%;        /* 撑满根区域 */
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 0;         /* 直角确保边缘无圆角漏缝 */
            padding: 20px 18px 22px 18px;
            box-shadow: none;
            border: none;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            gap: 18px;
            transition: background 0.2s ease;
        }

        /* 自定义滚动条 — 避免滚动条右侧露出底色缝隙 (已与根背景统一，无须担心) */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
            margin-block: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 20px;
            transition: 0.2s;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* 头部区域 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 44px;
        }
        h2 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #7156de;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            margin: 0;
            letter-spacing: -0.3px;
        }
        /* 主题按钮 */
        .theme-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .theme-btn:hover {
            background: rgba(255,255,255,0.28);
            transform: scale(1.02);
        }

        /* 前缀列表容器 — 无额外边距，底部无白缝 */
        .prefix-list {
            max-height: 280px;
            overflow-y: auto;
            flex-shrink: 0;
            border-radius: 12px;
            margin: 0 -2px;    /* 微调视觉不溢出, 但不影响白边 */
            padding: 0 2px;
        }
        .prefix-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .prefix-item.current {
            background: rgba(74, 110, 224, 0.22);
            border-radius: 28px;
            margin: 5px 0;
            border-bottom: none;
            backdrop-filter: blur(2px);
        }
        .prefix-url {
            flex: 1;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.75rem;
            word-break: break-all;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }
        .note {
            font-size: 0.68rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            flex-wrap: wrap;
        }
        .btn-icon {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 4px 8px;
            border-radius: 32px;
            opacity: 0.7;
            color: inherit;
            transition: 0.15s;
        }
        .btn-icon:hover {
            opacity: 1;
            background: rgba(255,255,255,0.12);
            transform: scale(1.02);
        }
        .add-line {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .add-line input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 44px;
            border: none;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
            transition: 0.2s;
            backdrop-filter: blur(4px);
        }
        .add-line input:focus {
            box-shadow: 0 0 0 2px var(--accent);
            background: rgba(0,0,0,0.4);
        }
        button {
            background: var(--accent);
            border: none;
            padding: 10px 18px;
            border-radius: 44px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            font-size: 0.8rem;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            filter: brightness(1.02);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            backdrop-filter: blur(2px);
        }
        .btn-outline:hover {
            background: rgba(74,110,224,0.12);
            transform: translateY(-1px);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 4px;
        }
        .footer-note {
            font-size: 0.68rem;
            text-align: center;
            color: var(--text-secondary);
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed var(--border);
            letter-spacing: 0.2px;
        }

        /* 提示toast 也匹配主题 */
        #toastMsg {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            color: #FFD966;
            padding: 6px 18px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            z-index: 10000;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
            font-family: monospace;
            border: 0.5px solid rgba(255,217,102,0.3);
        }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="header">
        <h2>🔗 前缀管理</h2>
        <button id="themeToggle" class="theme-btn">🌓</button>
    </div>

    <div id="prefixList" class="prefix-list"></div>

    <div class="add-line">
        <input type="text" id="newPrefix" placeholder="您添加的前缀" autofocus>
        <button id="addBtn">+ 添加</button>
    </div>

    <div class="btn-group">
        <button id="importTxtBtn" class="btn-outline">📂 导入txt</button>
        <button id="exportTxtBtn" class="btn-outline">💾 导出txt</button>
        <button id="backupBtn" class="btn-outline">📦 备份</button>
        <button id="restoreBtn" class="btn-outline">🔄 恢复</button>
        <input type="file" id="importFile" accept=".txt" style="display:none">
        <input type="file" id="restoreFile" accept=".json" style="display:none">
    </div>

    <div class="footer-note">
        ✏️ 编辑备注 | ⭐ 设为当前 | 🗑️ 删除（至少保留一条）
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
